<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Suno Discord Analysis</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-gray-900 min-h-screen flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-sm">

    <!-- Header -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-700 rounded-2xl mb-3 shadow-lg">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900 tracking-tight">Suno Discord Analysis</h1>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">

      <!-- Tabs -->
      <div class="flex border-b border-gray-200" role="tablist" aria-label="Authentication">
        <button id="tab-login-btn" role="tab" aria-selected="true" aria-controls="tab-login"
                class="flex-1 py-3 text-sm font-semibold border-b-2 border-indigo-600 text-indigo-700
                       focus-visible:outline focus-visible:outline-2 focus-visible:outline-indigo-700">
          Log In
        </button>
        <button id="tab-register-btn" role="tab" aria-selected="false" aria-controls="tab-register"
                class="flex-1 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500
                       hover:text-gray-700 transition-colors
                       focus-visible:outline focus-visible:outline-2 focus-visible:outline-indigo-700">
          Sign Up
        </button>
      </div>

      <!-- Login panel -->
      <div id="tab-login" role="tabpanel" class="p-6 space-y-4">

        {% if google_enabled %}
        <a href="/api/auth/google"
           class="w-full flex items-center justify-center gap-2.5 border border-gray-300 rounded-lg
                  py-2 px-3 text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors">
          <svg viewBox="0 0 24 24" class="w-4 h-4 shrink-0" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </a>
        <div class="relative flex items-center">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="mx-3 text-xs text-gray-400">or</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>
        {% endif %}

        <div>
          <label for="login-username" class="block text-xs font-semibold text-gray-700 mb-1">Username</label>
          <input id="login-username" type="text" autocomplete="username" placeholder="your username"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900
                        focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600" />
        </div>
        <div>
          <label for="login-password" class="block text-xs font-semibold text-gray-700 mb-1">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900
                        focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600" />
        </div>
        <p id="login-error" class="hidden text-xs text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2" role="alert"></p>
        <button id="login-btn"
                class="w-full bg-indigo-700 text-white rounded-lg py-2 text-sm font-semibold
                       hover:bg-indigo-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed
                       focus-visible:outline focus-visible:outline-3 focus-visible:outline-indigo-900 focus-visible:outline-offset-2">
          Log In
        </button>
      </div>

      <!-- Register panel -->
      <div id="tab-register" role="tabpanel" class="p-6 space-y-4 hidden">

        {% if google_enabled %}
        <a href="/api/auth/google"
           class="w-full flex items-center justify-center gap-2.5 border border-gray-300 rounded-lg
                  py-2 px-3 text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors">
          <svg viewBox="0 0 24 24" class="w-4 h-4 shrink-0" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign up with Google
        </a>
        <div class="relative flex items-center">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="mx-3 text-xs text-gray-400">or</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>
        {% endif %}

        <div>
          <label for="reg-username" class="block text-xs font-semibold text-gray-700 mb-1">Username</label>
          <input id="reg-username" type="text" autocomplete="username" placeholder="choose a username"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900
                        focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600" />
          <p class="text-xs text-gray-400 mt-1">2–40 characters.</p>
        </div>
        <div>
          <label for="reg-password" class="block text-xs font-semibold text-gray-700 mb-1">Password</label>
          <input id="reg-password" type="password" autocomplete="new-password" placeholder="at least 8 characters"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900
                        focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600" />
        </div>
        <div>
          <label for="reg-confirm" class="block text-xs font-semibold text-gray-700 mb-1">Confirm Password</label>
          <input id="reg-confirm" type="password" autocomplete="new-password" placeholder="repeat password"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900
                        focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600" />
        </div>
        <p id="reg-error" class="hidden text-xs text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2" role="alert"></p>
        <button id="reg-btn"
                class="w-full bg-indigo-700 text-white rounded-lg py-2 text-sm font-semibold
                       hover:bg-indigo-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed
                       focus-visible:outline focus-visible:outline-3 focus-visible:outline-indigo-900 focus-visible:outline-offset-2">
          Create Account
        </button>
      </div>

    </div>

  </div>

  <script>
    const firstRun = {{ first_run | tojson }};

    // Show error from Google OAuth callback redirect
    const _urlError = new URLSearchParams(window.location.search).get('error');
    if (_urlError) {
      const el = document.getElementById('login-error');
      el.textContent = decodeURIComponent(_urlError);
      el.classList.remove('hidden');
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tab-login').classList.toggle('hidden', !isLogin);
      document.getElementById('tab-register').classList.toggle('hidden',  isLogin);
      document.getElementById('tab-login-btn').setAttribute('aria-selected', isLogin ? 'true' : 'false');
      document.getElementById('tab-register-btn').setAttribute('aria-selected', isLogin ? 'false' : 'true');
      document.getElementById('tab-login-btn').classList.toggle('border-indigo-600',  isLogin);
      document.getElementById('tab-login-btn').classList.toggle('text-indigo-700',    isLogin);
      document.getElementById('tab-login-btn').classList.toggle('border-transparent', !isLogin);
      document.getElementById('tab-login-btn').classList.toggle('text-gray-500',      !isLogin);
      document.getElementById('tab-register-btn').classList.toggle('border-indigo-600',  !isLogin);
      document.getElementById('tab-register-btn').classList.toggle('text-indigo-700',    !isLogin);
      document.getElementById('tab-register-btn').classList.toggle('border-transparent',  isLogin);
      document.getElementById('tab-register-btn').classList.toggle('text-gray-500',       isLogin);
    }

    if (firstRun) switchTab('register');

    document.getElementById('tab-login-btn').addEventListener('click',    () => switchTab('login'));
    document.getElementById('tab-register-btn').addEventListener('click', () => switchTab('register'));

    // Login
    async function doLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl  = document.getElementById('login-error');
      const btn      = document.getElementById('login-btn');
      errorEl.classList.add('hidden');

      if (!username || !password) {
        errorEl.textContent = 'Username and password are required.';
        errorEl.classList.remove('hidden');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Logging in…';
      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed.');
        window.location.href = data.redirect || '/';
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.remove('hidden');
        btn.disabled    = false;
        btn.textContent = 'Log In';
      }
    }

    // Register
    async function doRegister() {
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;
      const errorEl  = document.getElementById('reg-error');
      const btn      = document.getElementById('reg-btn');
      errorEl.classList.add('hidden');

      if (!username) {
        errorEl.textContent = 'Username is required.';
        errorEl.classList.remove('hidden');
        return;
      }
      if (!password || password.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.';
        errorEl.classList.remove('hidden');
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.remove('hidden');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Creating account…';
      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Registration failed.');
        window.location.href = data.redirect || '/';
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.remove('hidden');
        btn.disabled    = false;
        btn.textContent = 'Create Account';
      }
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('reg-btn').addEventListener('click',   doRegister);

    // Enter key submits
    ['login-username','login-password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });
    ['reg-username','reg-password','reg-confirm'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
    });
  </script>
</body>
</html>
