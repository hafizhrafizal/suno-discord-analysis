<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup — Suno Discord Analysis</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-gray-900 min-h-screen flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-xl">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-700 rounded-2xl mb-4 shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Suno Discord Analysis</h1>
      <p class="text-gray-500 mt-1 text-sm">Choose how this app will be used</p>
    </div>

    <!-- Mode cards -->
    <div class="grid gap-4 sm:grid-cols-2 mb-6">

      <!-- Single User -->
      <button id="btn-single"
              class="mode-card group text-left bg-white rounded-2xl shadow p-5 border-2 border-transparent
                     hover:border-indigo-500 hover:shadow-md transition-all
                     focus-visible:outline focus-visible:outline-3 focus-visible:outline-indigo-700 focus-visible:outline-offset-2">
        <div class="flex items-start gap-3">
          <div class="mt-0.5 shrink-0 w-9 h-9 rounded-xl bg-indigo-100 flex items-center justify-center
                      group-hover:bg-indigo-200 transition-colors">
            <svg class="w-5 h-5 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
          <div>
            <h2 class="font-bold text-gray-900 text-sm leading-tight">Single User</h2>
            <p class="text-xs text-gray-500 mt-1 leading-relaxed">
              Just you. Enter your OpenAI API key on the first visit — no login required.
            </p>
          </div>
        </div>
        <ul class="mt-3 space-y-1">
          <li class="text-xs text-gray-600 flex items-center gap-1.5">
            <span class="text-green-600 font-bold">✓</span> No accounts or passwords
          </li>
          <li class="text-xs text-gray-600 flex items-center gap-1.5">
            <span class="text-green-600 font-bold">✓</span> API key stored in your browser
          </li>
          <li class="text-xs text-gray-600 flex items-center gap-1.5">
            <span class="text-green-600 font-bold">✓</span> Instant access
          </li>
        </ul>
      </button>

      <!-- Multi User -->
      <button id="btn-multi"
              class="mode-card group text-left bg-white rounded-2xl shadow p-5 border-2 border-transparent
                     hover:border-indigo-500 hover:shadow-md transition-all
                     focus-visible:outline focus-visible:outline-3 focus-visible:outline-indigo-700 focus-visible:outline-offset-2">
        <div class="flex items-start gap-3">
          <div class="mt-0.5 shrink-0 w-9 h-9 rounded-xl bg-indigo-100 flex items-center justify-center
                      group-hover:bg-indigo-200 transition-colors">
            <svg class="w-5 h-5 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </div>
          <div>
            <h2 class="font-bold text-gray-900 text-sm leading-tight">Multi User</h2>
            <p class="text-xs text-gray-500 mt-1 leading-relaxed">
              Multiple accounts with individual API keys, login, and session management.
            </p>
          </div>
        </div>
        <ul class="mt-3 space-y-1">
          <li class="text-xs text-gray-600 flex items-center gap-1.5">
            <span class="text-green-600 font-bold">✓</span> Per-user accounts &amp; API keys stored in your browsers
          </li>
          <li class="text-xs text-gray-600 flex items-center gap-1.5">
            <span class="text-green-600 font-bold">✓</span> Secure session cookies
          </li>
          <li class="text-xs text-gray-600 flex items-center gap-1.5">
            <span class="text-green-600 font-bold">✓</span> Register / Login flow
          </li>
        </ul>
      </button>

    </div>

    <!-- Error message -->
    <p id="error-msg" class="hidden text-sm text-red-700 text-center bg-red-50 border border-red-200 rounded-xl px-4 py-2 mb-4" role="alert"></p>

    <p class="text-xs text-gray-400 text-center">
      This choice is permanent and cannot be changed without resetting the database,
      unless the <code class="bg-gray-100 px-1 rounded">APP_MODE</code> environment variable overrides it.
    </p>

  </div>

  <script>
    async function chooseMode(mode) {
      const btns = document.querySelectorAll('.mode-card');
      btns.forEach(b => { b.disabled = true; b.classList.add('opacity-60'); });
      const errorEl = document.getElementById('error-msg');
      errorEl.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/set-mode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to set mode.');
        window.location.href = data.redirect || '/';
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.remove('hidden');
        btns.forEach(b => { b.disabled = false; b.classList.remove('opacity-60'); });
      }
    }

    document.getElementById('btn-single').addEventListener('click', () => chooseMode('single'));
    document.getElementById('btn-multi').addEventListener('click',  () => chooseMode('multi'));
  </script>
</body>
</html>
